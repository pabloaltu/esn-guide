version: '3.8'

services:
  # 1. Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: esn_guide_db
    restart: always
    environment:
      POSTGRES_USER: esn_student_user
      POSTGRES_PASSWORD: slovakia_is_beautiful_2026
      POSTGRES_DB: esn_guide_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  # 2. API Backend Node.js / Express
  backend:
    build: ./backend
    container_name: esn_guide_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://esn_student_user:slovakia_is_beautiful_2026@db:5432/esn_guide_db
      - PORT=8000
    volumes:
      - ./backend:/app
    depends_on:
      - db

  # 3. Client Frontend React (Vite)
  frontend:
    build: ./frontend
    container_name: esn_guide_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Empêche Docker d'écraser les node_modules locaux s'ils sont différents
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: